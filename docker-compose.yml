version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: algoverse-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: algoverse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - algoverse-network
    restart: always

  redis:
    image: redis:7-alpine
    container_name: algoverse-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - algoverse-network
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: algoverse-backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/algoverse?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=algoverse-jwt-super-secret-key-2026
      - NODE_ENV=development
      - PORT=4000
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis
    networks:
      - algoverse-network
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: algoverse-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=nextauth-secret-key-321-abc
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - algoverse-network
    restart: always

volumes:
  postgres_data:
  redis_data:

networks:
  algoverse-network:
    driver: bridge
